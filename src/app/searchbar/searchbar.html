<div class="flex items-center justify-center gap-3 my-6">
  <input
    type="text"
    [(ngModel)]="gameName"
    placeholder="Digite o nome de um jogo"
    (keyup.enter)="onSearch()"
    class="w-80 rounded-lg border border-gray-300 px-4 py-3 text-base outline-none focus:border-blue-500"
  />

  <button
    (click)="onSearch()"
    class="rounded-lg bg-blue-600 px-5 py-3 text-white font-medium hover:bg-blue-700 transition"
  >
    Buscar
  </button>
</div>
